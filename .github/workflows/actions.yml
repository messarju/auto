name: Run

on:
  workflow_dispatch:
    inputs:
      run_url:
        type: string
      run_enu:
        type: string
      run_cmd:
        type: string
      run_env:
        type: string
        default: '{"OPENAI_API_KEY": "6S7gaNybKLjwxKHg7duGCc"}'
      with:
        type: string
jobs:
  start:
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.sha }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v2

      - uses: FedericoCarboni/setup-ffmpeg@v3
        if: contains(github.event.inputs.with, 'ffmpeg')
        id: setup-ffmpeg

      - name: Set Environment
        shell: bash
        run: |
          echo '${{ toJson(vars) }}' | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' >> $GITHUB_ENV
          # Use jq to format the JSON into KEY=VALUE lines and append to $GITHUB_ENV
          echo '${{ github.event.inputs.run_env }}' | jq -r 'to_entries | .[] | "\(.key)<<EOF\n\(.value)\nEOF"' >> $GITHUB_ENV

      - name: run
        env:
          RUN_URL: ${{ inputs.run_url }}
          RUN_ENU: ${{ inputs.run_enu }}
          RUN_CMD: ${{ inputs.run_cmd }}
        run: |

          if [ ! -z "$RUN_URL" ]; then
            source <(curl -L "$RUN_URL" | tr -d "\r")
          fi

          if [ ! -z "$RUN_ENU" ]; then
            source <(curl -L "$RUN_ENU" | base64 -d -i | python dec.py | tr -d "\r")
          fi

          if [ ! -z "$RUN_CMD" ]; then
            eval "$RUN_CMD"
          fi

      - run: WHAT=run1 exec "$SHELL" ./runx.sh
      - run: WHAT=run2 exec "$SHELL" ./runx.sh
      - run: WHAT=run3 exec "$SHELL" ./runx.sh
      - run: WHAT=run4 exec "$SHELL" ./runx.sh
      - run: WHAT=run5 exec "$SHELL" ./runx.sh

      - name: release
        run: |
          python3 << 'EOF' 1> run.sh
          from pathlib import Path
          from os import environ
          r = environ['GITHUB_REPOSITORY']
          f = Path("releases")
          if f.exists():
            with f.open() as o:
              for x in o:
                x = x.strip()
                if x:
                  g = Path(x)
                  print(f"gh -R {r} release upload alpha {g}")
          EOF
          [ ! -f run.sh ] || cat run.sh
          [ ! -f run.sh ] || source run.sh
